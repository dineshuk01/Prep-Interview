apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: ai-interview-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        # The image will be dynamically updated by GitHub Actions
        image: AWS_ACCOUNT_ID.dkr.ecr.AWS_REGION.amazonaws.com/ai-interview-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
